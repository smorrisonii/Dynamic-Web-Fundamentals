<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Character Card</title>
  <meta name="description" content="A JavaScript character card that tracks health and level.">

  <!-- Open Graph -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Character Card">
  <meta property="og:description" content="A JavaScript character card that tracks health and level.">
  <meta property="og:url" content="https://yourURLofPage.here">
  <meta property="og:image" content="https://yourURLofSocialPreviewImageHere.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Character Card">
  <meta name="twitter:description" content="A JavaScript character card that tracks health and level.">
  <meta name="twitter:image" content="https://yourURLofSocialPreviewImageHere.png">

  <link rel="icon" href="favicon.ico">
  <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
  <link rel="stylesheet" href="character_card.css">
  <script src="character_card.js" defer></script>
</head>

<body>
  <main>
    <section class="card">
      <img id="characterImage" class="image" src="images/snortleblat.webp" alt="Swamp Beast Diplomat">

      <h1 id="characterName" class="name">Swamp Beast Diplomat</h1>

      <div class="stats">
        <p><strong>Class:</strong> <span id="characterClass"></span></p>
        <p><strong>Level:</strong> <span id="characterLevel"></span></p>
        <p><strong>Health:</strong> <span id="characterHealth"></span></p>
      </div>

      <div class="buttons">
        <button id="attackButton" type="button">Attacked</button>
        <button id="levelButton" type="button">Level Up</button>
      </div>

      <p id="message"></p>
    </section>
  </main>
</body>
</html>
